<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="SafeNexus" />
    <meta name="apple-mobile-web-app-title" content="SafeNexus" />
    <meta name="theme-color" content="#1d74f5" />
    <title>SafeNexus - Request Access</title>
    <link rel="canonical" href="https://safe-nexus.org/request-access.html" />
    <link rel="icon" type="image/png" sizes="352x352" href="/assets/safenexus-mark.png" />
    <link rel="apple-touch-icon" href="/assets/safenexus-mark.png" />
    <link rel="manifest" href="/site.webmanifest" />
<link rel="stylesheet" href="/styles.css?v=20260420f" />
  </head>
  <body class="auth-page">
    <section class="auth-screen auth-request-screen">
      <div class="auth-minimal-shell">
        <section class="auth-minimal-card auth-request-card" aria-label="Request access">
          <div class="auth-logo auth-logo-compact brand-lockup auth-brand-lockup" aria-label="SafeNexus" role="img">
            <span class="brand-logo-badge auth-brand-mark" aria-hidden="true">
              <img src="/assets/safenexus-mark.png" alt="" class="brand-logo-image" />
            </span>
            <span class="brand-wordmark auth-brand-wordmark" aria-hidden="true">
              <span class="brand-wordmark-core">Safe</span><span class="brand-wordmark-accent">Nexus</span>
            </span>
          </div>

          <div class="auth-login-copy auth-request-copy">
            <h1>Request access</h1>
            <p>Enter your organization details, your contact details and a password. A SafeNexus administrator will receive your request by email.</p>
          </div>

          <form id="request-access-form" class="auth-form auth-form-tenant auth-request-form">
            <label class="field">
              <span>Organization</span>
              <input id="request-organization-name" type="text" placeholder="Organization name" required />
            </label>

            <label class="field">
              <span>Organization OIB</span>
              <input
                id="request-organization-oib"
                type="text"
                inputmode="numeric"
                maxlength="11"
                autocomplete="off"
                placeholder="11-digit OIB"
                required
              />
            </label>

            <label class="field">
              <span>First name</span>
              <input id="request-first-name" type="text" autocomplete="given-name" placeholder="First name" required />
            </label>

            <label class="field">
              <span>Last name</span>
              <input id="request-last-name" type="text" autocomplete="family-name" placeholder="Last name" required />
            </label>

            <label class="field field-span-full">
              <span>Email</span>
              <div class="auth-input-shell">
                <span class="auth-input-icon auth-input-icon-email" aria-hidden="true"></span>
                <input id="request-email" type="email" autocomplete="email" placeholder="Email address" required />
              </div>
            </label>

            <label class="field">
              <span>Password</span>
              <div class="auth-input-shell">
                <span class="auth-input-icon auth-input-icon-password" aria-hidden="true"></span>
                <input id="request-password" type="password" autocomplete="new-password" placeholder="Create password" required />
              </div>
            </label>

            <label class="field">
              <span>Repeat password</span>
              <div class="auth-input-shell">
                <span class="auth-input-icon auth-input-icon-password" aria-hidden="true"></span>
                <input id="request-password-repeat" type="password" autocomplete="new-password" placeholder="Repeat password" required />
              </div>
            </label>

            <button id="request-submit-button" type="submit" class="primary-button auth-submit-button field-span-full">Send request</button>
          </form>

          <p id="request-feedback" class="form-success" aria-live="polite"></p>

          <div class="auth-switch-row auth-request-actions">
            <span class="auth-switch-copy">Already have an account?</span>
            <a class="auth-switch-link" href="/">Sign in</a>
          </div>
        </section>
      </div>
    </section>

    <script type="module" src="/src/auth-transitions.js?v=20260329d"></script>
    <script type="module" src="/src/request-access.js?v=20260328aj"></script>
  </body>
</html>
