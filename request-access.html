<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Access</title>
    <link rel="stylesheet" href="/styles.css?v=20260326e" />
  </head>
  <body class="auth-page">
    <section class="auth-screen auth-request-screen">
      <div class="auth-minimal-shell">
        <section class="auth-minimal-card auth-request-card" aria-label="Request access">
          <div class="auth-logo auth-logo-compact" aria-label="Safety360">
            <div class="auth-logo-mark">
              <span></span>
              <span></span>
            </div>
            <span class="auth-logo-word">Safety360</span>
          </div>

          <div class="auth-login-copy auth-request-copy">
            <h1>Request access</h1>
            <p>Enter your organization, full name, email and password. The administrator will receive your request by email.</p>
          </div>

          <form id="request-access-form" class="auth-form auth-form-tenant">
            <label class="field">
              <span>Organization</span>
              <input id="request-organization-name" type="text" placeholder="Organization name" required />
            </label>

            <label class="field">
              <span>Full name</span>
              <input id="request-full-name" type="text" placeholder="Full name" required />
            </label>

            <label class="field">
              <span>Email</span>
              <div class="auth-input-shell">
                <span class="auth-input-icon auth-input-icon-email" aria-hidden="true"></span>
                <input id="request-email" type="email" autocomplete="email" placeholder="Email address" required />
              </div>
            </label>

            <label class="field">
              <span>Password</span>
              <div class="auth-input-shell">
                <span class="auth-input-icon auth-input-icon-password" aria-hidden="true"></span>
                <input id="request-password" type="password" autocomplete="new-password" placeholder="Create password" required />
              </div>
            </label>

            <button id="request-submit-button" type="submit" class="primary-button auth-submit-button">Send request</button>
          </form>

          <p id="request-feedback" class="form-success" aria-live="polite"></p>

          <div class="auth-switch-row auth-request-actions">
            <span class="auth-switch-copy">Already have an account?</span>
            <a class="auth-switch-link" href="/">Sign in</a>
          </div>
        </section>
      </div>
    </section>

    <script type="module" src="/src/auth-transitions.js?v=20260326e"></script>
    <script type="module" src="/src/request-access.js?v=20260326e"></script>
  </body>
</html>
