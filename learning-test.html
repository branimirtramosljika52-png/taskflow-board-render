<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SafeNexus - Pristup ispitu</title>
  <link rel="canonical" href="https://safe-nexus.org/learning-test.html" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body.learning-public-root {
      margin: 0;
      min-height: 100vh;
      background: #f6f2fb;
      color: #252232;
      font-family: "Segoe UI", Tahoma, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .learning-public-shell {
      width: min(980px, 100%);
      background: #ffffff;
      border: 1px solid rgba(214, 120, 184, 0.3);
      border-radius: 20px;
      box-shadow: 0 22px 60px rgba(46, 29, 77, 0.14);
      padding: 18px 20px 22px;
      display: grid;
      gap: 14px;
    }

    .learning-public-title {
      margin: 0;
      font-size: clamp(1.2rem, 1.6vw, 1.55rem);
      font-weight: 800;
    }

    .learning-public-meta {
      margin: 0;
      color: #6a6480;
      font-size: 0.92rem;
    }

    .learning-public-card {
      border: 1px solid rgba(214, 120, 184, 0.28);
      border-radius: 14px;
      padding: 12px;
      background: #fcf8ff;
      display: grid;
      gap: 10px;
    }

    .learning-public-question {
      border: 1px solid rgba(186, 157, 255, 0.42);
      border-radius: 12px;
      padding: 10px;
      background: #ffffff;
      display: grid;
      gap: 8px;
    }

    .learning-public-question h3 {
      margin: 0;
      font-size: 1rem;
    }

    .learning-public-options {
      display: grid;
      gap: 8px;
    }

    .learning-public-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: start;
      border: 1px solid rgba(214, 120, 184, 0.24);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .learning-public-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .learning-public-error {
      margin: 0;
      color: #af1740;
      font-weight: 700;
      min-height: 1.2em;
    }

    .learning-public-success {
      margin: 0;
      color: #1f6f56;
      font-weight: 700;
      min-height: 1.2em;
    }
  </style>
</head>
<body class="learning-public-root">
  <main class="learning-public-shell" id="learning-public-app">
    <h1 class="learning-public-title">Učitavam ispit…</h1>
    <p class="learning-public-meta">Provjeri link koji si dobio. Ako je token ispravan, test će se prikazati ovdje.</p>
    <p class="learning-public-error" id="learning-public-error"></p>
    <p class="learning-public-success" id="learning-public-success"></p>
    <section class="learning-public-card" id="learning-public-content" hidden></section>
  </main>
  <script type="module" src="/src/learning-test.js"></script>
</body>
</html>
