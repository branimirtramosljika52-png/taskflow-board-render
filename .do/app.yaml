name: taskflow-board-do
region: fra
features:
  - buildpack-stack=ubuntu-22
services:
  - name: web
    environment_slug: node-js
    git:
      branch: main
      repo_clone_url: https://github.com/branimirtramosljika52-png/taskflow-board-render.git
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${taskflow-db.DATABASE_URL}
databases:
  - name: taskflow-db
    engine: PG
    version: "16"
    production: false
